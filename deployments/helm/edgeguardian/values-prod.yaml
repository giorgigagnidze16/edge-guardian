image:
  tag: 0.2.0

ui:
  image:
    tag: 0.2.0
  # Leave blank - computed from ingress.baseDomain. Override only if you use
  # a different URL scheme than ui.<baseDomain> / keycloak.<baseDomain>.
  keycloakIssuerUrl: ""
  nextAuthUrl: ""
  publicApiUrl: ""

externalAccess:
  mode: clusterIP

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  baseDomain: ""
  tls:
    enabled: true
    secretName: edgeguardian-tls
    clusterIssuer: letsencrypt-prod

controller:
  replicas: 1
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 2Gi }
  # Leave blank - computed from ingress.baseDomain. Override for a custom CRL
  # endpoint that must be stable (signed into leaf certs' CDP).
  publicUrl: ""
  crlUrl: ""
  keycloakIssuerUri: ""
  # Blank = derived from ingress.baseDomain (controller URL, and the MQTT broker
  # URLs at mqtt.<base>, which the shared ingress LB carries via TCP).
  agentInstaller:
    controllerUrl: ""
    brokerUrl: ""
    mtlsBrokerUrl: ""

postgres:
  image: timescale/timescaledb:2.17.2-pg16
  storage: 20Gi
  credentials:
    database: edgeguardian
    username: edgeguardian

keycloak:
  image: quay.io/keycloak/keycloak:26.0

minio:
  image: minio/minio:RELEASE.2024-12-18T13-15-44Z
  storage: 20Gi
  credentials:
    username: edgeguardian

loki:
  image: grafana/loki:3.3.0
  storage: 20Gi

grafana:
  image: grafana/grafana:11.4.0
  storage: 5Gi
  admin:
    username: admin

emqx:
  image: emqx/emqx:5.8
  storage: 5Gi
  mqttUsers:
    controllerUsername: controller
    bootstrapUsername: bootstrap
  external:
    type: LoadBalancer
    annotations: {}
    loadBalancerIP: ""

pkiBootstrap:
  image: alpine/k8s:1.31.1

ota:
  publicKey: ""

mail:
  enabled: true
  host: smtp.gmail.com
  port: 587
  auth: true
  starttls: true
  from: ""
  username: ""

secrets:
  postgres:    { create: true, existingSecret: postgres-credentials }
  keycloak:    { create: true, existingSecret: keycloak-admin }
  emqxAdmin:   { create: true, existingSecret: emqx-admin }
  emqxMqtt:    { create: true, existingSecret: emqx-mqtt-users }
  minio:       { create: true, existingSecret: minio-credentials }
  grafana:     { create: true, existingSecret: grafana-admin }
  ui:          { create: true, existingSecret: ui-secrets }
  controller:  { create: true, existingSecret: controller-secrets }
