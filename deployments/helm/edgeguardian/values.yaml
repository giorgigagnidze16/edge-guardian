nameOverride: ""
fullnameOverride: ""

image:
  repository: edgeguardian/controller
  pullPolicy: IfNotPresent

ui:
  image:
    repository: edgeguardian/ui
    pullPolicy: IfNotPresent
  keycloakClientId: edgeguardian-ui
  internalKeycloakUrl: http://keycloak:9090
  # Explicit UI URL. When empty and ingress.enabled, computed as
  # "{scheme}://ui.{ingress.baseDomain}" in _helpers.tpl.
  nextAuthUrl: ""
  # Explicit OIDC issuer URL used by UI (next-auth). When empty, computed from
  # ingress.baseDomain. Format: "{scheme}://keycloak.{base}/kc/realms/edgeguardian".
  keycloakIssuerUrl: ""

externalAccess:
  mode: clusterIP
  nodePorts:
    controller: 30443
    emqxMtls: 30883
    emqxBootstrap: 31883
    ui: 30080
    keycloak: 30090

ingress:
  enabled: false
  className: nginx
  annotations: {}
  baseDomain: ""
  tls:
    enabled: false
    secretName: edgeguardian-tls
    clusterIssuer: letsencrypt-prod

controller:
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { memory: 1Gi }
  # Public base URL of the controller (used for CRL + agent installer).
  # Empty → computed from ingress.baseDomain.
  publicUrl: ""
  # Explicit CRL endpoint. Empty → "{publicUrl}/api/v1/pki/crl".
  crlUrl: ""
  # Agent installer URLs baked into the installer script. For HTTP the default
  # is computed; MQTT broker URLs must be explicit since MQTT does not traverse
  # an HTTP ingress. Set emqx.external.type=LoadBalancer and fill these in prod.
  agentInstaller:
    controllerUrl: ""
    brokerUrl: ""
    mtlsBrokerUrl: ""

postgres: {}
keycloak: {}
minio: {}
loki: {}
grafana: {}
emqx:
  # Independent external exposure for MQTT (HTTP ingress cannot proxy MQTT).
  # type: "" (default) follows externalAccess.mode; override with LoadBalancer
  # or NodePort so agents can reach the broker when HTTP uses ingress.
  external:
    type: ""
    annotations: {}

pki:
  brokerCa:
    duration: 87600h
    renewBefore: 720h
  brokerServerCert:
    duration: 8760h
    renewBefore: 720h

pkiBootstrap:
  image: alpine/k8s:1.31.1

# existingSecret names are load-bearing: templates reference them as the name
# field in secretKeyRef blocks. Do not rename without editing templates.
secrets:
  postgres:    { create: false, existingSecret: postgres-credentials }
  keycloak:    { create: false, existingSecret: keycloak-admin }
  emqxAdmin:   { create: false, existingSecret: emqx-admin }
  emqxMqtt:    { create: false, existingSecret: emqx-mqtt-users }
  minio:       { create: false, existingSecret: minio-credentials }
  grafana:     { create: false, existingSecret: grafana-admin }
  ui:          { create: false, existingSecret: ui-secrets }
  controller:  { create: false, existingSecret: controller-secrets }
