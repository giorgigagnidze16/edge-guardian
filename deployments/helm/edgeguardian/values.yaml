# ---- Global -----------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# ---- Controller image --------------------------------------------------------
image:
  repository: edgeguardian/controller
  tag: latest
  pullPolicy: IfNotPresent

# ---- UI ----------------------------------------------------------------------
ui:
  image:
    repository: edgeguardian/ui
    tag: latest
    pullPolicy: IfNotPresent
  # Browser-reachable URL of the Keycloak realm (OIDC issuer). Must match the URL
  # the Next.js server calls too, because Keycloak validates the `iss` claim.
  # Override per-cluster: --set ui.keycloakIssuerUrl=http://<minikube-ip>:30090/realms/edgeguardian
  keycloakIssuerUrl: http://localhost:30090/realms/edgeguardian
  keycloakClientId: edgeguardian-ui
  keycloakClientSecret: "edgeguardian-ui-secret"
  # NextAuth session cookie encryption key. Generate: openssl rand -base64 32
  nextAuthSecret: "dev-only-not-for-production-abcdef0123456789abcdef0123456789"
  nextAuthUrl: http://localhost:30080
  # Internal Keycloak URL for the UI's Next.js rewrite proxy (/kc/* → Keycloak).
  internalKeycloakUrl: http://keycloak:9090

# ---- Service exposure --------------------------------------------------------
# externalAccess: off ⇒ everything is ClusterIP only (prod: use Ingress separately)
# externalAccess: nodePort ⇒ external services exposed on fixed ports
externalAccess:
  # loadBalancer: services get an external IP (requires 'minikube tunnel' locally
  #               or a real cloud LB in production). Works on Windows+Docker.
  # nodePort:     services pinned to static NodePorts (only reachable when node
  #               IP is routable from the client, e.g. Linux/macOS minikube).
  # clusterIP:    internal only; use with an Ingress in front.
  mode: loadBalancer
  nodePorts:
    controller: 30443
    emqxMtls: 30883
    emqxBootstrap: 31883
    ui: 30080
    keycloak: 30090

# ---- Controller --------------------------------------------------------------
controller:
  replicas: 1
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { memory: 1Gi }
  # CA key encryption key for CaKeyEncryption. Blank uses an insecure dev default.
  # For prod: openssl rand -base64 32
  caEncryptionKey: ""
  # CRL Distribution Point URL embedded in every leaf cert. EMQX dereferences this
  # URL on each TLS handshake. Override with the public hostname in prod.
  crlUrl: http://edgeguardian-controller:8443/api/v1/pki/crl
  keycloakIssuerUri: http://keycloak:9090/kc/realms/edgeguardian

# ---- Postgres ----------------------------------------------------------------
postgres:
  image: timescale/timescaledb:latest-pg16
  storage: 10Gi
  credentials:
    database: edgeguardian
    username: edgeguardian
    password: edgeguardian-dev

# ---- Keycloak ----------------------------------------------------------------
keycloak:
  image: quay.io/keycloak/keycloak:26.0
  admin:
    username: admin
    password: admin

# ---- MinIO -------------------------------------------------------------------
minio:
  image: minio/minio:latest
  storage: 20Gi
  credentials:
    username: edgeguardian
    password: edgeguardian-dev

# ---- Loki --------------------------------------------------------------------
loki:
  image: grafana/loki:3.3.0
  storage: 10Gi

# ---- Grafana -----------------------------------------------------------------
grafana:
  image: grafana/grafana:11.4.0
  storage: 5Gi
  admin:
    username: admin
    password: admin

# ---- EMQX --------------------------------------------------------------------
emqx:
  image: emqx/emqx:5.8
  storage: 5Gi
  dashboardPassword: admin-secret
  mqttUsers:
    controllerUsername: controller
    controllerPassword: controller-secret
    bootstrapUsername: bootstrap
    bootstrapPassword: bootstrap-secret

# ---- PKI (cert-manager resources) --------------------------------------------
pki:
  brokerCa:
    duration: 87600h
    renewBefore: 720h
  brokerServerCert:
    duration: 8760h
    renewBefore: 720h

# ---- PKI bootstrap Job image -------------------------------------------------
# Image must contain openssl + kubectl (alpine/k8s ships both).
pkiBootstrap:
  image: alpine/k8s:1.31.1
