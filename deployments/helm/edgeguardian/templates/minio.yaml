apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "minio") | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.minio.credentials.username | quote }}
  password: {{ .Values.minio.credentials.password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "minio") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "minio") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "minio") | nindent 4 }}
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "minio") | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image | quote }}
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: { name: minio-credentials, key: username }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: minio-credentials, key: password }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: s3 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /minio/health/live, port: s3 }
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.minio.storage | quote }}
