apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "grafana") | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.grafana.admin.username | quote }}
  password: {{ .Values.grafana.admin.password | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "grafana") | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.grafana.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "grafana") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "grafana") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "grafana") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "grafana") | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: { secretKeyRef: { name: grafana-admin, key: username } }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: grafana-admin, key: password } }
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: Keycloak
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: grafana
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              value: grafana-secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: openid profile email
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: http://keycloak:9090/kc/realms/edgeguardian/protocol/openid-connect/auth
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: http://keycloak:9090/kc/realms/edgeguardian/protocol/openid-connect/token
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: http://keycloak:9090/kc/realms/edgeguardian/protocol/openid-connect/userinfo
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
