apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "keycloak") | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.keycloak.admin.username | quote }}
  password: {{ .Values.keycloak.admin.password | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "keycloak") | nindent 4 }}
data:
  edgeguardian-realm.json: |-
{{ .Files.Get "files/edgeguardian-realm.json" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "keycloak") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: http
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "keycloak") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "keycloak") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "keycloak") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "keycloak") | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          args: ["start-dev", "--import-realm"]
          ports:
            - name: http
              containerPort: 9090
            - name: management
              containerPort: 9000
          env:
            - name: KC_HTTP_PORT
              value: "9090"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/edgeguardian
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: username }
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: password }
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef: { name: keycloak-admin, key: username }
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: keycloak-admin, key: password }
            - name: KC_HOSTNAME_STRICT
              value: "false"
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
            optional: true
