apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "loki") | nindent 4 }}
data:
  local-config.yaml: |-
{{ .Files.Get "files/loki.yaml" | indent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "loki") | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.loki.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "loki") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3100
      targetPort: http
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "loki") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "loki") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "loki") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "loki") | nindent 8 }}
    spec:
      containers:
        - name: loki
          image: {{ .Values.loki.image | quote }}
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports:
            - name: http
              containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-data
