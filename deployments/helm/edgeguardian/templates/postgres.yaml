{{- if .Values.secrets.postgres.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.postgres.existingSecret }}
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
type: Opaque
stringData:
  database: {{ .Values.postgres.credentials.database | quote }}
  username: {{ .Values.postgres.credentials.username | quote }}
  password: {{ .Values.postgres.credentials.password | quote }}
---
{{- end }}
# Postgres runs /docker-entrypoint-initdb.d/*.sql exactly once, on a fresh
# PGDATA. Splits Keycloak and the controller into dedicated schemas so a
# controller-side data wipe (TRUNCATE ALL) never touches Keycloak's realm,
# users, or admin state. Existing clusters keep working on `public`; to roll
# an existing install onto the split schemas, re-init the PVC (or run the
# statements manually — they're idempotent).
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-schemas
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
data:
  00-schemas.sql: |
    CREATE SCHEMA IF NOT EXISTS keycloak;
    CREATE SCHEMA IF NOT EXISTS edgeguardian;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: pg
      port: 5432
      targetPort: pg
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "postgres") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "postgres") | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: database }
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: username }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: password }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-schemas
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init-schemas
          configMap:
            name: postgres-init-schemas
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage | quote }}
