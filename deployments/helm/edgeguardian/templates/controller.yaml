{{- if .Values.secrets.controller.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.controller.existingSecret }}
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
type: Opaque
stringData:
  ca_encryption_key: {{ .Values.controller.caEncryptionKey | default "" | quote }}
  mail_password: {{ .Values.mail.password | default "" | quote }}
  agent_publish_token: {{ .Values.controller.agentPublishToken | default "" | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: controller
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8443
      targetPort: http
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "controller") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: edgeguardian-controller
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
    app.kubernetes.io/exposure: external
spec:
  type: {{ include "edgeguardian.externalServiceType" . }}
  ports:
    - name: http
      port: 8443
      targetPort: http
      {{- if eq .Values.externalAccess.mode "nodePort" }}
      nodePort: {{ .Values.externalAccess.nodePorts.controller }}
      {{- end }}
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "controller") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "controller") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 8 }}
      annotations:
        checksum/runtime-urls: {{ include "edgeguardian.runtimeUrlsChecksum" . }}
    spec:
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8443
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.controller.springProfilesActive | default "prod" | quote }}
            - name: SPRING_DATASOURCE_URL
              # currentSchema is a search_path — edgeguardian first so our CREATEs
              # land there, public second so the TimescaleDB extension functions
              # (create_hypertable, by_range, ...) installed in public are resolved.
              value: jdbc:postgresql://postgres:5432/edgeguardian?currentSchema=edgeguardian,public
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: username } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: password } }
            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef: { name: edgeguardian-runtime-urls, key: KEYCLOAK_ISSUER_URL }
            - name: KEYCLOAK_JWK_SET_URI
              value: "http://keycloak:9090/kc/realms/edgeguardian/protocol/openid-connect/certs"
            - name: EDGEGUARDIAN_CONTROLLER_MQTT_BROKER_URL
              value: tcp://emqx:1883
            - name: EDGEGUARDIAN_CONTROLLER_MQTT_USERNAME
              valueFrom: { secretKeyRef: { name: emqx-mqtt-users, key: controller_username } }
            - name: EDGEGUARDIAN_CONTROLLER_MQTT_PASSWORD
              valueFrom: { secretKeyRef: { name: emqx-mqtt-users, key: controller_password } }
            - name: EMQX_ADMIN_URL
              value: http://emqx:18083/api/v5
            - name: EMQX_ADMIN_USERNAME
              valueFrom: { secretKeyRef: { name: emqx-admin, key: username } }
            - name: EMQX_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: emqx-admin, key: password } }
            - name: EDGEGUARDIAN_CONTROLLER_MINIO_ENDPOINT
              value: http://minio:9000
            - name: EDGEGUARDIAN_CONTROLLER_MINIO_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: minio-credentials, key: username } }
            - name: EDGEGUARDIAN_CONTROLLER_MINIO_SECRET_KEY
              valueFrom: { secretKeyRef: { name: minio-credentials, key: password } }
            - name: EDGEGUARDIAN_CONTROLLER_LOKI_URL
              value: http://loki:3100
            - name: PKI_CRL_URL
              value: {{ include "edgeguardian.crlUrl" . | quote }}
            - name: PKI_BROKER_CA_PATH
              value: /pki/broker-ca/ca.crt
            - name: CA_ENCRYPTION_KEY
              valueFrom: { secretKeyRef: { name: controller-secrets, key: ca_encryption_key } }
            - name: AGENT_PUBLISH_TOKEN
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.controller.existingSecret }}, key: agent_publish_token } }
            - name: EDGEGUARDIAN_AGENT_INSTALLER_CONTROLLER_URL
              value: {{ coalesce .Values.controller.agentInstaller.controllerUrl (include "edgeguardian.controllerPublicUrl" .) | quote }}
            - name: EDGEGUARDIAN_AGENT_INSTALLER_BROKER_URL
              value: {{ .Values.controller.agentInstaller.brokerUrl | default (printf "tcp://mqtt.%s:1883" .Values.ingress.baseDomain) | quote }}
            - name: EDGEGUARDIAN_AGENT_INSTALLER_MTLS_BROKER_URL
              value: {{ .Values.controller.agentInstaller.mtlsBrokerUrl | default (printf "ssl://mqtt.%s:8883" .Values.ingress.baseDomain) | quote }}
            - name: EDGEGUARDIAN_AGENT_INSTALLER_BOOTSTRAP_PASSWORD
              valueFrom: { secretKeyRef: { name: emqx-mqtt-users, key: bootstrap_password } }
            - name: MAIL_ENABLED
              value: {{ .Values.mail.enabled | quote }}
            - name: MAIL_HOST
              value: {{ .Values.mail.host | quote }}
            - name: MAIL_PORT
              value: {{ .Values.mail.port | quote }}
            - name: MAIL_FROM
              value: {{ .Values.mail.from | quote }}
            - name: MAIL_USERNAME
              value: {{ .Values.mail.username | default "" | quote }}
            - name: MAIL_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.controller.existingSecret }}, key: mail_password } }
            - name: MAIL_SMTP_AUTH
              value: {{ .Values.mail.auth | quote }}
            - name: MAIL_SMTP_STARTTLS
              value: {{ .Values.mail.starttls | quote }}
            - name: MAIL_APP_URL
              value: {{ .Values.mail.appUrl | default (include "edgeguardian.nextAuthUrl" .) | quote }}
            - name: OTA_PUBLIC_KEY
              value: {{ .Values.ota.publicKey | default "" | quote }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: broker-ca
              mountPath: /pki/broker-ca
              readOnly: true
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      volumes:
        # cert-manager creates this Secret (post-install hook). Marked optional so the
        # controller Pod can start before the hook fires - kubelet picks up the Secret
        # contents within ~60s of creation and BrokerCaProvider reads them on next call.
        - name: broker-ca
          secret:
            secretName: edgeguardian-broker-ca-secret
            optional: true
