{{- if .Values.secrets.controller.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.controller.existingSecret }}
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
type: Opaque
stringData:
  ca_encryption_key: {{ .Values.controller.caEncryptionKey | default "" | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: controller
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8443
      targetPort: http
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "controller") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: edgeguardian-controller
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
    app.kubernetes.io/exposure: external
spec:
  type: {{ include "edgeguardian.externalServiceType" . }}
  ports:
    - name: http
      port: 8443
      targetPort: http
      {{- if eq .Values.externalAccess.mode "nodePort" }}
      nodePort: {{ .Values.externalAccess.nodePorts.controller }}
      {{- end }}
  selector:
    {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "controller") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  labels:
    {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "edgeguardian.componentSelector" (dict "ctx" . "component" "controller") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edgeguardian.componentLabels" (dict "ctx" . "component" "controller") | nindent 8 }}
    spec:
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8443
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/edgeguardian
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: username } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: password } }
            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef: { name: edgeguardian-runtime-urls, key: KEYCLOAK_ISSUER_URL }
            - name: KEYCLOAK_JWK_SET_URI
              value: "http://keycloak:9090/kc/realms/edgeguardian/protocol/openid-connect/certs"
            - name: EDGEGUARDIAN_CONTROLLER_MQTT_BROKER_URL
              value: tcp://emqx:1883
            - name: EDGEGUARDIAN_CONTROLLER_MQTT_USERNAME
              valueFrom: { secretKeyRef: { name: emqx-mqtt-users, key: controller_username } }
            - name: EDGEGUARDIAN_CONTROLLER_MQTT_PASSWORD
              valueFrom: { secretKeyRef: { name: emqx-mqtt-users, key: controller_password } }
            - name: EMQX_ADMIN_URL
              value: http://emqx:18083/api/v5
            - name: EMQX_ADMIN_USERNAME
              valueFrom: { secretKeyRef: { name: emqx-admin, key: username } }
            - name: EMQX_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: emqx-admin, key: password } }
            - name: EDGEGUARDIAN_CONTROLLER_MINIO_ENDPOINT
              value: http://minio:9000
            - name: EDGEGUARDIAN_CONTROLLER_MINIO_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: minio-credentials, key: username } }
            - name: EDGEGUARDIAN_CONTROLLER_MINIO_SECRET_KEY
              valueFrom: { secretKeyRef: { name: minio-credentials, key: password } }
            - name: EDGEGUARDIAN_CONTROLLER_LOGGING_LOKI_URL
              value: http://loki:3100
            - name: PKI_CRL_URL
              value: {{ .Values.controller.crlUrl | quote }}
            - name: PKI_BROKER_CA_PATH
              value: /pki/broker-ca/ca.crt
            - name: CA_ENCRYPTION_KEY
              valueFrom: { secretKeyRef: { name: controller-secrets, key: ca_encryption_key } }
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: broker-ca
              mountPath: /pki/broker-ca
              readOnly: true
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      volumes:
        # cert-manager creates this Secret (post-install hook). Marked optional so the
        # controller Pod can start before the hook fires — kubelet picks up the Secret
        # contents within ~60s of creation and BrokerCaProvider reads them on next call.
        - name: broker-ca
          secret:
            secretName: edgeguardian-broker-ca-secret
            optional: true
