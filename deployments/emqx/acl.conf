%% EMQX v5 ACL rules for EdgeGuardian.
%%
%% Two connection paths exist (see docker-compose.yml for listener config):
%%
%%   1. Enrollment listener (tcp/1883, password auth, built-in DB)
%%      Devices use this BEFORE they have a cert. Username 'bootstrap' is the
%%      only identity allowed here; ACL restricts it to the enroll/cert-request
%%      topics — nothing else.
%%
%%   2. Device listener (ssl/8883, mTLS, client cert required)
%%      Devices use this AFTER enrollment succeeds. ${clientid} is bound to the
%%      cert's CN (== deviceId) at TLS handshake time, so ACL scopes each device
%%      to its own topic tree.
%%
%% ACL is evaluated top-to-bottom; unmatched request hits the {deny, all} fall-through.

%% Controller: full access (uses password auth on the internal listener).
{allow, {username, "controller"}, all, ["edgeguardian/#"]}.

%% Enrollment listener (bootstrap identity only, publish-only to two topics).
{allow, {username, "bootstrap"}, publish,   ["edgeguardian/device/+/enroll/request"]}.
{allow, {username, "bootstrap"}, publish,   ["edgeguardian/device/+/cert/request"]}.
{allow, {username, "bootstrap"}, subscribe, ["edgeguardian/device/+/enroll/response"]}.
{allow, {username, "bootstrap"}, subscribe, ["edgeguardian/device/+/cert/response"]}.

%% Device listener (mTLS — ${clientid} is bound to the cert's CN).
{allow, all, publish,   ["edgeguardian/device/${clientid}/telemetry"]}.
{allow, all, publish,   ["edgeguardian/device/${clientid}/logs"]}.
{allow, all, publish,   ["edgeguardian/device/${clientid}/heartbeat"]}.
{allow, all, publish,   ["edgeguardian/device/${clientid}/ota/status"]}.
{allow, all, publish,   ["edgeguardian/device/${clientid}/command/result"]}.
{allow, all, publish,   ["edgeguardian/device/${clientid}/cert/request"]}.
{allow, all, subscribe, ["edgeguardian/device/${clientid}/command"]}.
{allow, all, subscribe, ["edgeguardian/device/${clientid}/state/desired"]}.
{allow, all, subscribe, ["edgeguardian/device/${clientid}/cert/response"]}.

%% Deny everything else
{deny, all}.
