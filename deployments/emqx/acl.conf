%% EMQX ACL rules for EdgeGuardian
%%
%% Devices can only publish/subscribe to their own topics.
%% The controller has full access.

%% Controller: full access to all edgeguardian topics
{allow, {user, "controller"}, all, ["edgeguardian/#"]}.

%% Devices: publish to their own topics
{allow, all, publish, ["edgeguardian/device/${username}/telemetry"]}.
{allow, all, publish, ["edgeguardian/device/${username}/logs"]}.
{allow, all, publish, ["edgeguardian/device/${username}/ota/status"]}.
{allow, all, publish, ["edgeguardian/device/${username}/enroll/request"]}.
{allow, all, publish, ["edgeguardian/device/${username}/heartbeat"]}.
{allow, all, publish, ["edgeguardian/device/${username}/state/reported"]}.
{allow, all, publish, ["edgeguardian/device/${username}/command/result"]}.
{allow, all, publish, ["edgeguardian/device/${username}/cert/request"]}.

%% Devices: subscribe to their own topics
{allow, all, subscribe, ["edgeguardian/device/${username}/command"]}.
{allow, all, subscribe, ["edgeguardian/device/${username}/enroll/response"]}.
{allow, all, subscribe, ["edgeguardian/device/${username}/state/desired"]}.
{allow, all, subscribe, ["edgeguardian/device/${username}/cert/response"]}.

%% Deny everything else
{deny, all}.
