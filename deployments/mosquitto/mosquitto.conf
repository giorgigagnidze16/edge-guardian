# Mosquitto configuration for EdgeGuardian development.
# Phase 1: anonymous access, no TLS.
# Phase 3: mTLS required, anonymous disabled.

listener 1883
allow_anonymous true
protocol mqtt

# WebSocket listener for debugging
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type warning
log_type error
log_type information
