apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: edgeguardian/controller
    newTag: latest

patches:
  - path: patches/emqx-external-nodeport.yaml
    target: { kind: Service, name: emqx-external }
  - path: patches/controller-nodeport.yaml
    target: { kind: Service, name: edgeguardian-controller }
