apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  clusterIP: None  # headless service for StatefulSet stable DNS
  ports:
    - name: pg
      port: 5432
      targetPort: pg
  selector:
    app.kubernetes.io/name: postgres
