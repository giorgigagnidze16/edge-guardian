apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity
spec:
  replicas: 1
  strategy:
    type: Recreate  # ReadWriteOnce volumes + single replica
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: identity
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          ports:
            - name: http
              containerPort: 9090
          env:
            - name: KC_HTTP_PORT
              value: "9090"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/edgeguardian
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: username }
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-credentials, key: password }
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef: { name: keycloak-admin, key: username }
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: keycloak-admin, key: password }
            - name: KC_HOSTNAME_STRICT
              value: "false"
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
            optional: true  # operator can populate later
