apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: emqx-server
spec:
  secretName: emqx-server-tls
  duration: 8760h
  renewBefore: 720h
  commonName: emqx
  dnsNames:
    - emqx
    - emqx.edgeguardian.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - server auth
    - digital signature
    - key encipherment
  issuerRef:
    name: edgeguardian-broker-ca
    kind: Issuer
    group: cert-manager.io
