version: '3.8'

# Development infrastructure for EdgeGuardian.
# Start with: docker compose -f deployments/docker-compose.yml up -d

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: edgeguardian-postgres
    environment:
      POSTGRES_DB: edgeguardian
      POSTGRES_USER: edgeguardian
      POSTGRES_PASSWORD: edgeguardian-dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgeguardian"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: edgeguardian-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/edgeguardian
      KC_DB_USERNAME: edgeguardian
      KC_DB_PASSWORD: edgeguardian-dev
      KC_HTTP_PORT: 9090
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:9090"
    volumes:
      - ./keycloak/edgeguardian-realm.json:/opt/keycloak/data/import/edgeguardian-realm.json:ro
      - ./keycloak/themes/edgeguardian:/opt/keycloak/themes/edgeguardian:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9090 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # Bootstrap step: generates the broker's own TLS server cert and fetches the
  # concatenated CA bundle of every EdgeGuardian organization from the controller.
  # Must finish before the EMQX SSL listener can start.
  emqx-tls-init:
    image: alpine:3.20
    container_name: edgeguardian-emqx-tls-init
    restart: "no"
    environment:
      CONTROLLER_URL: ${CONTROLLER_URL:-http://host.docker.internal:8443}
      EMQX_HOSTNAME: emqx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - emqx_certs:/certs
      - ./emqx/init-tls.sh:/init-tls.sh:ro
    entrypoint: ["sh", "-c", "apk add --no-cache curl openssl && sh /init-tls.sh"]

  emqx:
    image: emqx/emqx:5.8
    container_name: edgeguardian-emqx
    depends_on:
      emqx-tls-init:
        condition: service_completed_successfully
    environment:
      EMQX_NAME: edgeguardian
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_PASSWORD: "admin-secret"

      # ---- Authentication -----------------------------------------------------------------
      # Global password chain — used by the TCP listener only (enrollment + controller).
      # The SSL listener disables this chain (enable_authn: false) because mTLS at the
      # transport layer is the authentication — the cert IS the credential, no password.
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__USER_ID_TYPE: username

      # ---- Authorization ------------------------------------------------------------------
      EMQX_AUTHORIZATION__NO_MATCH: deny
      EMQX_AUTHORIZATION__DENY_ACTION: disconnect
      EMQX_AUTHORIZATION__SOURCES__1__TYPE: file
      EMQX_AUTHORIZATION__SOURCES__1__PATH: "etc/acl.conf"

      # ---- Enrollment listener (tcp/1883, password-based) ---------------------------------
      # Devices without a cert connect here with username=bootstrap. ACL restricts them
      # to the enroll/cert-request topics only.
      EMQX_LISTENERS__TCP__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENERS__TCP__DEFAULT__ENABLE_AUTHN: "true"

      # ---- Device listener (ssl/8883, mTLS + CRL check) -----------------------------------
      # After enrollment, devices reconnect here presenting their issued leaf cert.
      # verify_peer + fail_if_no_peer_cert ⇒ no cert = no connection.
      # peer_cert_as_clientid = cn ⇒ the cert's CN becomes the MQTT clientid at connect
      #   time, which makes ACL ${clientid} equal to the deviceId.
      # enable_authn = false ⇒ no app-level auth on this listener; mTLS at the TLS layer
      #   is the authentication. Devices don't present a password.
      # enable_crl_check ⇒ EMQX reads the CDP (CRL Distribution Point) extension from the
      #   client cert — we embed http://controller:8443/api/v1/pki/crl/{orgId}.crl there —
      #   fetches the CRL and refuses connections whose serial is listed.
      EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
      EMQX_LISTENERS__SSL__DEFAULT__ENABLE_AUTHN: "false"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE:  "/opt/emqx/etc/certs/emqx-server.key"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: "/opt/emqx/etc/certs/emqx-server.crt"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: "/opt/emqx/etc/certs/ca-bundle.pem"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY: "verify_peer"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT: "true"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__ENABLE_CRL_CHECK: "true"
      EMQX_LISTENERS__SSL__DEFAULT__PEER_CERT_AS_CLIENTID: "cn"
      EMQX_LISTENERS__SSL__DEFAULT__PEER_CERT_AS_USERNAME: "cn"
      # Periodically refresh cached CRLs (seconds).
      EMQX_CRL_CACHE__REFRESH_INTERVAL: "300s"
      EMQX_CRL_CACHE__HTTP_TIMEOUT: "15s"
    ports:
      - "1883:1883"     # MQTT (enrollment listener, password auth)
      - "8883:8883"     # MQTT over TLS (device listener, mTLS + CRL)
      - "8083:8083"     # MQTT WebSocket
      - "18083:18083"   # EMQX Dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - emqx_data:/opt/emqx/data
      - ./emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      # Populated by emqx-tls-init — contains:
      #   emqx-server.{crt,key}  : the broker's own server TLS identity
      #   ca-bundle.pem          : trust anchors for validating every device's client cert
      - emqx_certs:/opt/emqx/etc/certs:ro
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx-init:
    image: curlimages/curl:latest
    container_name: edgeguardian-emqx-init
    depends_on:
      emqx:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./emqx/init-auth.sh:/init-auth.sh:ro
    entrypoint: ["sh", "/init-auth.sh"]

  minio:
    image: minio/minio:latest
    container_name: edgeguardian-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: edgeguardian
      MINIO_ROOT_PASSWORD: edgeguardian-dev
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.3.0
    container_name: edgeguardian-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.4.0
    container_name: edgeguardian-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: grafana-secret
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://localhost:9090/realms/edgeguardian/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:9090/realms/edgeguardian/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: http://keycloak:9090/realms/edgeguardian/protocol/openid-connect/userinfo
      GF_SERVER_ROOT_URL: http://localhost:3002
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy

volumes:
  pg_data:
  emqx_data:
  emqx_certs:
  minio_data:
  loki_data:
  grafana_data:
