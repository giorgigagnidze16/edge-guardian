version: '3.8'

# Development infrastructure for EdgeGuardian.
# Start with: docker compose -f deployments/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: edgeguardian-postgres
    environment:
      POSTGRES_DB: edgeguardian
      POSTGRES_USER: edgeguardian
      POSTGRES_PASSWORD: edgeguardian-dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgeguardian"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edgeguardian-mosquitto
    ports:
      - "1883:1883"   # MQTT plain (dev only)
      - "8883:8883"   # MQTT over TLS (Phase 3)
      - "9001:9001"   # WebSocket (for debugging)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
  mosquitto_data:
  mosquitto_log:
