server:
  port: 8443

spring:
  application:
    name: edgeguardian-controller

  # PostgreSQL (Phase 2)
  datasource:
    url: jdbc:postgresql://localhost:5432/edgeguardian
    username: edgeguardian
    password: edgeguardian
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# gRPC server configuration
grpc:
  server:
    port: 9090

# EdgeGuardian controller settings
edgeguardian:
  controller:
    grpc-port: 9090
    mqtt:
      broker-url: tcp://localhost:1883
      client-id: edgeguardian-controller
      topic-root: edgeguardian

logging:
  level:
    root: INFO
    com.edgeguardian: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
