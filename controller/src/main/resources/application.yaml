server:
  port: 8443

spring:
  application:
    name: edgeguardian-controller

  threads:
    virtual:
      enabled: true

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/edgeguardian
    username: edgeguardian
    password: edgeguardian-dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Keycloak OIDC resource server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/edgeguardian

# EdgeGuardian controller settings
edgeguardian:
  controller:
    mqtt:
      broker-url: tcp://localhost:1883
      client-id: edgeguardian-controller
      topic-root: edgeguardian
    ota:
      storage-dir: ./data/ota-artifacts
    loki:
      push-url: http://localhost:3100/loki/api/v1/push
      query-url: http://localhost:3100/loki/api/v1/query_range

logging:
  level:
    root: INFO
    com.edgeguardian: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
