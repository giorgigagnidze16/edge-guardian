server:
  port: 8443
  error:
    include-message: always

spring:
  application:
    name: edgeguardian-controller
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

  threads:
    virtual:
      enabled: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    include:
      - db
      - mqtt
      - security
      - ca
      - logging
      - monitoring
      - storage

edgeguardian:
  controller:
    device:
      offline-threshold-minutes: 5
    mail:
      enabled: ${MAIL_ENABLED:true}
      from: ${MAIL_FROM:EdgeGuardian <no-reply@edgeguardian.local>}
      app-url: ${MAIL_APP_URL:http://localhost:3000}