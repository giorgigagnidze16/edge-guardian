server:
  port: 8443

spring:
  application:
    name: edgeguardian-controller

  threads:
    virtual:
      enabled: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    include:
      - db
      - mqtt
      - security
      - logging
      - monitoring
      - storage

edgeguardian:
  controller:
    device:
      offline-threshold-minutes: 5
    cors:
      allowed-origins:
        - http://localhost:3000
        - http://localhost:3001