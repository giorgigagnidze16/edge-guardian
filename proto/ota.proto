syntax = "proto3";

package edgeguardian.v1;

option go_package = "github.com/edgeguardian/agent/internal/comms/proto";
option java_multiple_files = true;
option java_package = "com.edgeguardian.controller.grpc.proto";

import "google/protobuf/timestamp.proto";

// OTAService handles over-the-air update distribution.
service OTAService {
  // Check if an update is available for a device.
  rpc CheckUpdate(CheckUpdateRequest) returns (CheckUpdateResponse);

  // Download an update artifact (streamed in chunks).
  rpc DownloadArtifact(DownloadArtifactRequest) returns (stream ArtifactChunk);

  // Report the result of applying an update.
  rpc ReportUpdateStatus(ReportUpdateStatusRequest) returns (ReportUpdateStatusResponse);
}

message CheckUpdateRequest {
  string device_id = 1;
  string current_version = 2;
  string architecture = 3;
}

message CheckUpdateResponse {
  bool update_available = 1;
  string artifact_id = 2;
  string version = 3;
  int64 size_bytes = 4;
  bytes sha256_hash = 5;
  bytes ed25519_signature = 6;
  string release_notes = 7;
}

message DownloadArtifactRequest {
  string artifact_id = 1;
  int64 offset = 2;                 // resume support
}

message ArtifactChunk {
  bytes data = 1;
  int64 offset = 2;
  int64 total_size = 3;
}

message ReportUpdateStatusRequest {
  string device_id = 1;
  string artifact_id = 2;
  UpdateResult result = 3;
  string message = 4;
  google.protobuf.Timestamp timestamp = 5;
}

enum UpdateResult {
  UPDATE_RESULT_UNSPECIFIED = 0;
  UPDATE_RESULT_SUCCESS = 1;
  UPDATE_RESULT_FAILED = 2;
  UPDATE_RESULT_ROLLED_BACK = 3;
}

message ReportUpdateStatusResponse {
  bool acknowledged = 1;
}
